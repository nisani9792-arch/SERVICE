services:
  - type: web
    name: jusic-crm
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_INGEST_SECRET
        sync: false
      - key: GMAIL_MAILBOX
        value: "INBOX"
      - key: EMAIL_INGEST_LOOKBACK_DAYS
        value: "14"
      - key: EMAIL_INGEST_MAX_MESSAGES
        value: "25"
