services:
  - type: web
    name: jusic-crm
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: GATE_ACCESS_CODE
        value: "JUSIC"
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_IMAP_USER
        value: "EDITOR@JUSIC.CO"
      - key: EMAIL_IMAP_APP_PASSWORD
        sync: false
      - key: EMAIL_IMAP_HOST
        value: "imap.gmail.com"
      - key: EMAIL_IMAP_PORT
        value: "993"
      - key: EMAIL_SMTP_USER
        value: "EDITOR@JUSIC.CO"
      - key: EMAIL_SMTP_APP_PASSWORD
        sync: false
      - key: EMAIL_SMTP_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_SMTP_SECURE
        value: "false"
      - key: EMAIL_SMTP_TIMEOUT_MS
        value: "25000"
      - key: RENDER
        value: "true"
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: EMAIL_FROM
        value: "EDITOR@JUSIC.CO"
      - key: EMAIL_FROM_NAME
        value: "Jusic"
      - key: EMAIL_REPLY_PROVIDER
        value: "gmail_api"
      - key: EMAIL_INGEST_PROVIDER
        value: "imap"
      - key: EMAIL_INGEST_SECRET
        sync: false
      - key: EMAIL_IMAP_MAILBOX
        value: "INBOX"
      - key: EMAIL_INGEST_SOURCE_TAG
        value: "EDITOR"
      - key: EMAIL_INGEST_LOOKBACK_DAYS
        value: "14"
      - key: EMAIL_INGEST_MAX_MESSAGES
        value: "50"
      - key: EMAIL_INGEST_TIMEOUT_MS
        value: "90000"
      - key: EMAIL_INGEST_ATTACHMENTS
        value: "true"
      - key: EMAIL_ATTACHMENT_MAX_BYTES
        value: "8388608"
      - key: EMAIL_ATTACHMENT_MAX_COUNT
        value: "8"
      - key: EMAIL_ATTACHMENT_ALLOW
        value: "image,video"
      - key: BACKUP_RETENTION_COUNT
        value: "12"
      - key: BACKUP_INCLUDE_ATTACHMENTS
        value: "true"
      - key: EMAIL_OUTBOUND_SECRET
        sync: false
  - type: cron
    name: jusic-db-backup
    runtime: node
    schedule: "0 4 */3 * *"
    buildCommand: npm install
    startCommand: npm run db-backup:trigger
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: BACKUP_URL
        sync: false
      - key: BACKUP_SECRET
        sync: false
      - key: EMAIL_INGEST_URL
        sync: false
      - key: EMAIL_INGEST_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
  - type: cron
    name: jusic-email-ingest
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: npm run email-ingest:trigger
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: EMAIL_INGEST_URL
        fromService:
          type: web
          name: jusic-crm
          property: host
      - key: EMAIL_INGEST_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
  - type: cron
    name: jusic-email-outbound
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: npm run email-outbound:trigger
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: EMAIL_OUTBOUND_URL
        fromService:
          type: web
          name: jusic-crm
          property: host
      - key: EMAIL_OUTBOUND_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
